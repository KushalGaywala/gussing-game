# nginx config for the Gujarati Imposter PWA (static site).
# Tuned for Coolify + PWA install + Bubblewrap/TWA (Trusted Web Activity).

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile      on;
  tcp_nopush    on;
  server_tokens off;

  # PWA manifest must be served with the correct type so Chrome / Bubblewrap
  # recognise it. The `.webmanifest` extension is not in nginx's default map.
  types {
    application/manifest+json  webmanifest;
  }

  gzip              on;
  gzip_vary         on;
  gzip_comp_level   6;
  gzip_min_length   256;
  gzip_types        text/plain text/css application/javascript application/json
                    application/manifest+json image/svg+xml;

  server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Digital Asset Links — this is what makes Bubblewrap / TWA domain
    # verification succeed. Must be reachable, JSON, and CORS-open.
    location = /.well-known/assetlinks.json {
      default_type application/json;
      add_header Access-Control-Allow-Origin "*";
      add_header Cache-Control "public, max-age=3600";
      try_files $uri =404;
    }

    # Service worker and manifest must never be cached hard, or clients get
    # stuck on a stale app shell after a deploy.
    location = /sw.js {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      types { application/javascript js; }
      try_files $uri =404;
    }

    location = /manifest.webmanifest {
      add_header Cache-Control "no-cache";
      try_files $uri =404;
    }

    # App code/assets are NOT fingerprinted, so they must revalidate — otherwise
    # a deploy leaves returning clients running an old cached script against the
    # fresh HTML. `no-cache` = keep in cache but revalidate every load (cheap
    # 304s via ETag); the service worker still provides offline support.
    location ~* \.(css|js|svg|png|woff2?)$ {
      add_header Cache-Control "no-cache";
      try_files $uri =404;
    }

    # App shell — no long-term caching on the HTML entry point.
    location / {
      add_header Cache-Control "no-cache";
      try_files $uri $uri/ /index.html;
    }

    # Basic hardening.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }
}
